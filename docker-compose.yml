services:
  postgres:
    image: postgres:16-alpine
    container_name: puchamon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-puchamon}
      POSTGRES_USER: ${POSTGRES_USER:-puchamon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-puchamon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puchamon} -d ${POSTGRES_DB:-puchamon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: puchamon-api
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-puchamon}
      DB_USER: ${POSTGRES_USER:-puchamon}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-puchamon}
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secret}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: puchamon-front
    ports:
      - "${FRONT_PORT:-4200}:80"
    depends_on:
      - api

volumes:
  pg_data:
